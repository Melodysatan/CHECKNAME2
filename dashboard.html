<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>สถานะพนักงาน</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: "Tahoma", "Segoe UI", sans-serif;
    background: #0f0f14;
    margin: 0;
    padding: 32px;
    color: #e6e6e6;
    position: relative;
    overflow-x: hidden;
    min-height: 100vh;
  }
  .bg-emoji {
    position: fixed;
    top: -40px;
    font-size: 22px;
    opacity: 0.5;
    pointer-events: none;
    animation: fall linear infinite;
    z-index: 0;
  }
  @keyframes fall {
    from { transform: translateY(0) rotate(0deg); }
    to { transform: translateY(110vh) rotate(360deg); }
  }
  .content { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; }

  .header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 12px;
  }
  h1 {
    font-size: 20px;
    font-weight: 600;
    margin: 0;
    color: #fff;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .updated {
    font-size: 12px;
    color: #6f6f7d;
  }

  .shift-selector {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }
  .shift-btn {
    background: #1a1a22;
    border: 1px solid #2a2a35;
    color: #9a9aa8;
    font-size: 13px;
    font-weight: 500;
    padding: 7px 16px;
    border-radius: 999px;
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: inherit;
  }
  .shift-btn:hover {
    background: #24242e;
    color: #d5d5dd;
    transform: translateY(-1px);
  }
  .shift-btn.active {
    background: #3a3aff22;
    border-color: #6366f1;
    color: #a5a8ff;
  }

  /* ===== อนิเมชั่นทั่วเว็บให้ลื่นไหลขึ้น ===== */
  .summary-card {
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  .summary-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(0,0,0,0.35);
  }
  .summary-card .value {
    transition: color 0.3s ease;
  }
  .table-wrap {
    transition: box-shadow 0.2s ease;
    animation: fadeInUp 0.4s ease;
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .summary {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .summary-card {
    background: linear-gradient(145deg, #1c1c24, #15151a);
    border: 1px solid #2a2a35;
    border-radius: 14px;
    padding: 16px 18px;
    text-align: center;
  }
  .summary-card .label {
    font-size: 12px;
    color: #9a9aa8;
    margin-bottom: 6px;
  }
  .summary-card .value {
    font-size: 24px;
    font-weight: 600;
    color: #fff;
  }

  .table-wrap {
    background: #15151a;
    border: 1px solid #2a2a35;
    border-radius: 16px;
    overflow: hidden;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }
  th, td {
    padding: 13px 16px;
    font-size: 13px;
  }
  th {
    background: #1a1a22;
    color: #9a9aa8;
    font-weight: 500;
    border-bottom: 1px solid #2a2a35;
    text-align: left;
  }
  th:nth-child(1), td:nth-child(1) { width: 26%; text-align: left; }
  th:nth-child(2), td:nth-child(2) { width: 18%; text-align: center; }
  th:nth-child(3), td:nth-child(3) { width: 18%; text-align: right; }
  th:nth-child(4), td:nth-child(4) { width: 20%; text-align: center; }
  th:nth-child(5), td:nth-child(5) { width: 18%; text-align: right; }

  tbody tr {
    border-bottom: 1px solid #21212a;
    transition: background 0.15s;
  }
  tbody tr.row-active { background: #211616; }
  tbody tr.row-overtime { background: #2e1414; }
  tbody tr.row-overtime:hover { background: #381818; }
  tbody tr.row-active:hover { background: #2a1c1c; }
  tbody tr.row-idle:hover { background: #1a1a22; }
  tbody tr:last-child { border-bottom: none; }

  .username {
    font-weight: 500;
    color: #fff;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    padding: 4px 11px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
  }
  .badge-back { background: #16331f; color: #4caf6e; }
  .badge-heavy { background: #3a1717; color: #e57373; }
  .badge-light { background: #3a2e10; color: #e0a83a; }
  .badge-food { background: #3a2e10; color: #e0a83a; }
  .badge-overtime {
    background: #4a1212;
    color: #ff6b6b;
    animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255,107,107,0.5); }
    50% { box-shadow: 0 0 0 5px rgba(255,107,107,0.15); }
  }

  .checkin-icons { display: inline-flex; gap: 8px; }
  .checkin-col { display: inline-flex; flex-direction: column; align-items: center; gap: 2px; }
  .checkin-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    font-size: 13px;
    font-weight: 600;
  }
  .checkin-time {
    font-size: 10px;
    color: #4caf6e;
    font-family: Consolas, monospace;
  }
  .checkin-wide {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 4px 11px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 500;
  }
  .checkin-gray { background: #24242c; color: #45454f; }
  .checkin-red { background: #3a1717; color: #e57373; }
  .checkin-green { background: #16331f; color: #4caf6e; }
  .checkin-offshift { background: #1a1a22; color: #45454f; opacity: 0.6; }
  .checkin-holiday { background: #3a2e10; color: #e0c050; }

  .time-cell { font-family: Consolas, monospace; color: #c5c5d0; }
  .time-cell.idle { color: #6f6f7d; font-family: inherit; }
  .time-cell.overtime { color: #ff6b6b; font-weight: 600; }
  .total-time { font-family: Consolas, monospace; color: #6f6f7d; }
</style>
</head>
<body>

<div class="content">

<div class="header-row">
  <h1>📋 สถานะพนักงานวันนี้</h1>
  <div class="updated" id="updated"></div>
</div>

<div class="shift-selector" id="shift-selector">
  <button class="shift-btn" data-shift="auto">อัตโนมัติ</button>
  <button class="shift-btn" data-shift="เช้า">กะเช้า</button>
  <button class="shift-btn" data-shift="ดึก">กะดึก</button>
</div>

<div class="summary" id="summary"></div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>ผู้ใช้</th>
        <th>เช็คชื่อ รอบ 1/2</th>
        <th>เวลานับ</th>
        <th>สถานะ</th>
        <th>เวลารวมวันนี้</th>
      </tr>
    </thead>
    <tbody id="table-body"></tbody>
  </table>
</div>

</div>

<script>
const API_URL = "/api/status";
let selectedShift = "auto";

function setupShiftSelector() {
  const buttons = document.querySelectorAll(".shift-btn");
  buttons.forEach(btn => {
    btn.addEventListener("click", () => {
      selectedShift = btn.dataset.shift;
      buttons.forEach(b => b.classList.toggle("active", b === btn));
      loadData(); // โหลดใหม่ทันทีไม่ต้องรอ
    });
  });
  // ตั้งค่า default ให้ปุ่ม "อัตโนมัติ" active ไว้ก่อน
  document.querySelector('.shift-btn[data-shift="auto"]').classList.add("active");
}
setupShiftSelector();
const FLOAT_EMOJIS = ["🎉", "✨", "🌴", "💧", "🟦", "🟡", "🌟", "🍃"];

function spawnEmoji() {
  const el = document.createElement("div");
  el.className = "bg-emoji";
  el.textContent = FLOAT_EMOJIS[Math.floor(Math.random() * FLOAT_EMOJIS.length)];
  el.style.left = Math.random() * 100 + "vw";
  const duration = 10 + Math.random() * 12;
  el.style.animationDuration = duration + "s";
  el.style.fontSize = (16 + Math.random() * 14) + "px";
  document.body.appendChild(el);
  setTimeout(() => el.remove(), duration * 1000);
}
setInterval(spawnEmoji, 1200);
for (let i = 0; i < 6; i++) setTimeout(spawnEmoji, i * 400);

const OVERTIME_LIMITS = {
  "ปวดหนัก": 20 * 60,
  "ปวดน้อย": 6 * 60,
  "กินข้าว": 30 * 60,
};

const overtimeAlerted = new Set();
const warningAlerted = new Set();

let cachedThaiVoice = null;
function pickThaiVoice() {
  const voices = window.speechSynthesis.getVoices();
  if (!voices || voices.length === 0) return null;
  const thaiVoices = voices.filter(v => v.lang && v.lang.toLowerCase().startsWith("th"));
  if (thaiVoices.length === 0) return null;
  const googleVoice = thaiVoices.find(v => v.name.toLowerCase().includes("google"));
  return googleVoice || thaiVoices[0];
}
if (window.speechSynthesis) {
  cachedThaiVoice = pickThaiVoice();
  window.speechSynthesis.onvoiceschanged = () => { cachedThaiVoice = pickThaiVoice(); };
}

function speakText(text) {
  try {
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = "th-TH";
    if (cachedThaiVoice) utter.voice = cachedThaiVoice;
    utter.rate = 0.95;
    utter.pitch = 1;
    setTimeout(() => window.speechSynthesis.speak(utter), 80);
  } catch (err) {
    console.warn("พูดเสียงเตือนไม่ได้", err);
  }
}
function speakAlert(username, activity) {
  const shortName = username.split("-").slice(0, 2).join(" ");
  speakText(`${shortName} เกินเวลา${activity}แล้ว รีบกลับที่นั่งให้ไว`);
}
function speakWarning(username, activity) {
  const shortName = username.split("-").slice(0, 2).join(" ");
  speakText(`${shortName} จะเกินเวลา${activity}แล้ว ให้รีบกดกลับครับ`);
}

function badgeClass(status) {
  if (status === "กลับที่นั่ง") return "badge-back";
  if (status === "ปวดหนัก") return "badge-heavy";
  if (status === "ปวดน้อย") return "badge-light";
  if (status === "กินข้าว") return "badge-food";
  return "";
}

function formatDuration(seconds) {
  seconds = Math.max(0, Math.floor(seconds));
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = seconds % 60;
  return [h, m, s].map(v => String(v).padStart(2, "0")).join(":");
}

function formatAgo(seconds) {
  const m = Math.floor(seconds / 60);
  if (m < 1) return "กลับมาเมื่อสักครู่";
  return `กลับมา ${m} นาทีที่แล้ว`;
}

function roundIconHtml(round, roundNum) {
  if (round.status === "green") {
    return `<span class="checkin-col">
      <span class="checkin-badge checkin-green" title="รอบ ${roundNum}">✓</span>
      ${round.time ? `<span class="checkin-time">${round.time}</span>` : ""}
    </span>`;
  }
  if (round.status === "red") {
    return `<span class="checkin-col"><span class="checkin-badge checkin-red" title="รอบ ${roundNum} ยังไม่เช็คชื่อ">!</span></span>`;
  }
  return `<span class="checkin-col"><span class="checkin-badge checkin-gray" title="รอบ ${roundNum} ยังไม่ประกาศ">·</span></span>`;
}

async function loadData() {
  try {
    const url = selectedShift === "auto" ? API_URL : `${API_URL}?shift=${encodeURIComponent(selectedShift)}`;
    const res = await fetch(url);
    const data = await res.json();

    // อัปเดตปุ่ม "อัตโนมัติ" ให้บอกว่าตอนนี้กะจริงคือกะไหน
    const autoBtn = document.querySelector('.shift-btn[data-shift="auto"]');
    if (autoBtn && data.current_shift) {
      autoBtn.textContent = selectedShift === "auto" ? `อัตโนมัติ (${data.current_shift})` : "อัตโนมัติ";
    }

    const summaryEl = document.getElementById("summary");
    summaryEl.innerHTML = `
      <div class="summary-card">
        <div class="label">กำลังออกนอกที่นั่ง</div>
        <div class="value">${data.summary.out_now}</div>
      </div>
      ${Object.entries(data.summary.activity_counts_today).map(([act, count]) => `
        <div class="summary-card">
          <div class="label">${act}วันนี้</div>
          <div class="value">${count} ครั้ง</div>
        </div>
      `).join("")}
    `;

    const tbody = document.getElementById("table-body");

    const sortedPeople = [...data.people].sort((a, b) => {
      const getPriority = (p) => {
        if (!p.checkin) return 0;
        if (p.checkin.round1.status === "offshift") return 2;
        if (p.checkin.round1.status === "holiday") return 1;
        return 0;
      };
      const aPriority = getPriority(a);
      const bPriority = getPriority(b);
      if (aPriority !== bPriority) return aPriority - bPriority;

      const aActive = a.status !== "กลับที่นั่ง";
      const bActive = b.status !== "กลับที่นั่ง";
      if (aActive !== bActive) return aActive ? -1 : 1;
      if (!aActive && !bActive) return a.duration_seconds - b.duration_seconds;
      return 0;
    });

    const newOvertimePeople = [];
    const newWarningPeople = [];
    const currentOvertimeUsers = new Set();
    const currentWarningUsers = new Set();

    sortedPeople.forEach(p => {
      const isBack = p.status === "กลับที่นั่ง";
      const limit = OVERTIME_LIMITS[p.status];
      const isOvertime = !isBack && limit && p.duration_seconds > limit;
      const isNearLimit = !isBack && limit && !isOvertime && p.duration_seconds >= (limit - 60);

      if (isOvertime) {
        currentOvertimeUsers.add(p.user_id);
        if (!overtimeAlerted.has(p.user_id)) newOvertimePeople.push({ username: p.username, activity: p.status });
      } else if (isNearLimit) {
        currentWarningUsers.add(p.user_id);
        if (!warningAlerted.has(p.user_id)) newWarningPeople.push({ username: p.username, activity: p.status });
      }
    });

    newWarningPeople.forEach((p, i) => setTimeout(() => speakWarning(p.username, p.activity), i * 3000));
    newOvertimePeople.forEach((p, i) => setTimeout(() => speakAlert(p.username, p.activity), (newWarningPeople.length + i) * 3000));

    overtimeAlerted.clear();
    currentOvertimeUsers.forEach(id => overtimeAlerted.add(id));
    warningAlerted.clear();
    currentWarningUsers.forEach(id => warningAlerted.add(id));

    tbody.innerHTML = sortedPeople.map(p => {
      const isBack = p.status === "กลับที่นั่ง";
      const limit = OVERTIME_LIMITS[p.status];
      const isOvertime = !isBack && limit && p.duration_seconds > limit;

      const displayLabel = isOvertime ? `เกินเวลา${p.status}` : p.status;
      const badgeCls = isOvertime ? "badge-overtime" : badgeClass(p.status);
      const warnIcon = isOvertime ? "⚠️ " : "";
      const rowCls = isBack ? "row-idle" : (isOvertime ? "row-overtime" : "row-active");

      const timeHtml = isBack
        ? `<span class="time-cell idle">${formatAgo(p.duration_seconds)}</span>`
        : isOvertime
          ? `<span class="time-cell overtime">+${formatDuration(p.duration_seconds - limit)}</span>`
          : limit
            ? `<span class="time-cell">${formatDuration(limit - p.duration_seconds)}</span>`
            : `<span class="time-cell">${formatDuration(p.duration_seconds)}</span>`;

      const isHoliday = p.checkin && p.checkin.round1.status === "holiday";
      const isOffshift = p.checkin && p.checkin.round1.status === "offshift";

      let checkinHtml;
      if (!p.checkin) {
        checkinHtml = "";
      } else if (isHoliday) {
        checkinHtml = `<span class="checkin-wide checkin-holiday">วันหยุด</span>`;
      } else if (isOffshift) {
        checkinHtml = `<span class="checkin-wide checkin-offshift">ไม่ใช่กะนี้</span>`;
      } else {
        checkinHtml = `<span class="checkin-icons">${roundIconHtml(p.checkin.round1, 1)}${roundIconHtml(p.checkin.round2, 2)}</span>`;
      }

      return `
        <tr class="${rowCls}">
          <td><span class="username">${p.username}</span></td>
          <td>${checkinHtml}</td>
          <td>${timeHtml}</td>
          <td><span class="badge ${badgeCls}">${warnIcon}${displayLabel}</span></td>
          <td><span class="total-time">${formatDuration(p.total_today_seconds || 0)}</span></td>
        </tr>
      `;
    }).join("");

    document.getElementById("updated").textContent = "อัปเดตล่าสุด: " + new Date().toLocaleTimeString("th-TH");
  } catch (err) {
    console.error("โหลดข้อมูลไม่สำเร็จ", err);
  }
}

loadData();
setInterval(loadData, 1000);
</script>

</body>
</html>
