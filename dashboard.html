<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>สถานะพนักงาน</title>
<style>
  body {
    font-family: "Tahoma", "Segoe UI", sans-serif;
    background: #121212;
    margin: 0;
    padding: 24px;
    color: #e6e6e6;
  }
  h1 {
    font-size: 20px;
    margin-bottom: 16px;
    color: #fff;
  }
  .summary {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .summary-card {
    background: #1e1e1e;
    border: 1px solid #2a2a2a;
    border-radius: 10px;
    padding: 16px 20px;
    min-width: 140px;
  }
  .summary-card .label {
    font-size: 13px;
    color: #999;
    margin-bottom: 4px;
  }
  .summary-card .value {
    font-size: 24px;
    font-weight: bold;
    color: #fff;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    background: #1e1e1e;
    border: 1px solid #2a2a2a;
    border-radius: 10px;
    overflow: hidden;
  }
  th, td {
    text-align: left;
    padding: 12px 16px;
    border-bottom: 1px solid #2a2a2a;
    font-size: 14px;
  }
  th {
    background: #181818;
    color: #aaa;
    font-weight: 600;
  }
  tr:last-child td {
    border-bottom: none;
  }
  .badge {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
  }
  .badge-back { background: #16331f; color: #4caf6e; }
  .badge-heavy { background: #3a1717; color: #e57373; }
  .badge-light { background: #3a2e10; color: #e0a83a; }
  .badge-food { background: #3a2e10; color: #e0a83a; }
  .updated {
    margin-top: 12px;
    font-size: 12px;
    color: #777;
  }
</style>
</head>
<body>

<h1>สถานะพนักงานวันนี้</h1>

<div class="summary" id="summary"></div>

<table>
  <thead>
    <tr>
      <th>ชื่อผู้ใช้</th>
      <th>รหัสผู้ใช้</th>
      <th>สถานะ</th>
      <th>เวลา</th>
    </tr>
  </thead>
  <tbody id="table-body"></tbody>
</table>

<div class="updated" id="updated"></div>

<script>
const API_URL = "/api/status";

function badgeClass(status) {
  if (status === "กลับที่นั่ง") return "badge-back";
  if (status === "ปวดหนัก") return "badge-heavy";
  if (status === "ปวดน้อย") return "badge-light";
  if (status === "กินข้าว") return "badge-food";
  return "";
}

function formatDuration(seconds) {
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = seconds % 60;
  return [h, m, s].map(v => String(v).padStart(2, "0")).join(":");
}

async function loadData() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();

    const summaryEl = document.getElementById("summary");
    summaryEl.innerHTML = `
      <div class="summary-card">
        <div class="label">กำลังออกนอกที่นั่ง</div>
        <div class="value">${data.summary.out_now}</div>
      </div>
      ${Object.entries(data.summary.activity_counts_today).map(([act, count]) => `
        <div class="summary-card">
          <div class="label">${act}วันนี้</div>
          <div class="value">${count} ครั้ง</div>
        </div>
      `).join("")}
    `;

    const tbody = document.getElementById("table-body");
    tbody.innerHTML = data.people.map(p => `
      <tr>
        <td>${p.username}</td>
        <td>${p.user_id}</td>
        <td><span class="badge ${badgeClass(p.status)}">${p.status}</span></td>
        <td>${p.status === "กลับที่นั่ง" ? "-" : formatDuration(p.duration_seconds)}</td>
      </tr>
    `).join("");

    document.getElementById("updated").textContent =
      "อัปเดตล่าสุด: " + new Date().toLocaleTimeString("th-TH");
  } catch (err) {
    console.error("โหลดข้อมูลไม่สำเร็จ", err);
  }
}

loadData();
setInterval(loadData, 5000);
</script>

</body>
</html>
