<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>สถานะพนักงาน</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: "Tahoma", "Segoe UI", sans-serif;
    background: #0f0f14;
    margin: 0;
    padding: 32px;
    color: #e6e6e6;
    position: relative;
    overflow-x: hidden;
    min-height: 100vh;
  }
  .bg-emoji {
    position: fixed;
    top: -40px;
    font-size: 22px;
    opacity: 0.5;
    pointer-events: none;
    animation: fall linear infinite;
    z-index: 0;
  }
  @keyframes fall {
    from { transform: translateY(0) rotate(0deg); }
    to { transform: translateY(110vh) rotate(360deg); }
  }
  .content { position: relative; z-index: 1; }
  h1 {
    font-size: 22px;
    margin-bottom: 20px;
    color: #fff;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .summary {
    display: flex;
    gap: 14px;
    margin-bottom: 28px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .summary-card {
    background: linear-gradient(145deg, #1c1c24, #15151a);
    border: 1px solid #2a2a35;
    border-radius: 14px;
    padding: 18px 22px;
    min-width: 150px;
    text-align: center;
  }
  .summary-card .label {
    font-size: 13px;
    color: #9a9aa8;
    margin-bottom: 6px;
  }
  .summary-card .value {
    font-size: 26px;
    font-weight: bold;
    color: #fff;
  }
  .table-wrap {
    background: #15151a;
    border: 1px solid #2a2a35;
    border-radius: 14px;
    overflow: hidden;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }
  th:nth-child(1), td:nth-child(1) { width: 35%; }
  th:nth-child(2), td:nth-child(2) { width: 35%; text-align: center; }
  th:nth-child(3), td:nth-child(3) { width: 35%; text-align: right; }
  th, td {
    text-align: left;
    padding: 14px 18px;
    font-size: 14px;
  }
  th {
    background: #1a1a22;
    color: #9a9aa8;
    font-weight: 600;
    border-bottom: 1px solid #2a2a35;
  }
  tbody tr {
    border-bottom: 1px solid #21212a;
    transition: background 0.15s;
  }
  tbody tr.row-active {
    background: #211616;
  }
  tbody tr.row-active:hover {
    background: #2a1c1c;
  }
  tbody tr.row-idle:hover {
    background: #1a1a22;
  }
  tbody tr:last-child {
    border-bottom: none;
  }
  .user-cell {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 500;
  }
  .badge {
    display: inline-block;
    padding: 4px 11px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
  }
  .badge-back { background: #16331f; color: #4caf6e; }
  .badge-heavy { background: #3a1717; color: #e57373; }
  .checkin-badge {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 500;
    white-space: nowrap;
  }
  .checkin-gray { background: #24242c; color: #6f6f7d; }
  .checkin-red { background: #3a1717; color: #e57373; }
  .checkin-green { background: #16331f; color: #4caf6e; }
  .checkin-offshift { background: #1a1a22; color: #45454f; opacity: 0.5; }
  .checkin-holiday { background: #3a2e10; color: #e0c050; }
  .badge-light { background: #3a2e10; color: #e0a83a; }
  .badge-food { background: #3a2e10; color: #e0a83a; }
  .badge-overtime {
    background: #4a1212;
    color: #ff6b6b;
    animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255,107,107,0.5); }
    50% { box-shadow: 0 0 0 5px rgba(255,107,107,0.15); }
  }
  .time-cell {
    color: #c5c5d0;
    font-family: "Consolas", monospace;
  }
  .time-cell.idle {
    color: #6f6f7d;
    font-family: inherit;
  }
  .updated {
    margin-top: 16px;
    font-size: 12px;
    color: #6f6f7d;
  }
</style>
</head>
<body>

<div class="content">

<h1>📋 สถานะพนักงานวันนี้</h1>

<div class="summary" id="summary"></div>

<div class="table-wrap">
<table>
  <thead>
    <tr>
      <th>ผู้ใช้</th>
      <th style="text-align:center;">สถานะ</th>
      <th>เวลา</th>
    </tr>
  </thead>
  <tbody id="table-body"></tbody>
</table>
</div>

<div class="updated" id="updated"></div>

</div>

<script>
const API_URL = "/api/status";
const FLOAT_EMOJIS = ["🎉", "✨", "🌴", "💧", "🟦", "🟡", "🌟", "🍃"];

function spawnEmoji() {
  const el = document.createElement("div");
  el.className = "bg-emoji";
  el.textContent = FLOAT_EMOJIS[Math.floor(Math.random() * FLOAT_EMOJIS.length)];
  el.style.left = Math.random() * 100 + "vw";
  const duration = 10 + Math.random() * 12;
  el.style.animationDuration = duration + "s";
  el.style.fontSize = (16 + Math.random() * 14) + "px";
  document.body.appendChild(el);
  setTimeout(() => el.remove(), duration * 1000);
}
setInterval(spawnEmoji, 1200);
for (let i = 0; i < 6; i++) setTimeout(spawnEmoji, i * 400);

const OVERTIME_LIMITS = {
  "ปวดหนัก": 20 * 60,
  "ปวดน้อย": 6 * 60,
  "กินข้าว": 30 * 60,
};

// เก็บรายชื่อคนที่เกินเวลาอยู่แล้ว (กันเสียงดังซ้ำทุกครั้งที่รีเฟรช)
const overtimeAlerted = new Set();
// เก็บรายชื่อคนที่เตือนล่วงหน้าไปแล้ว (กันเตือนซ้ำ)
const warningAlerted = new Set();

function speakAlert(username, activity) {
  try {
    const shortName = username.split("-").slice(0, 2).join(" ");
    const text = `${shortName} เกินเวลา${activity}แล้ว รีบกลับที่นั่งให้ไว`;
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = "th-TH";
    utter.rate = 1;
    utter.pitch = 1;
    window.speechSynthesis.speak(utter);
  } catch (err) {
    console.warn("พูดเสียงเตือนไม่ได้", err);
  }
}

function speakWarning(username, activity) {
  try {
    const shortName = username.split("-").slice(0, 2).join(" ");
    const text = `${shortName} จะเกินเวลา${activity}แล้ว ให้รีบกดกลับครับ`;
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = "th-TH";
    utter.rate = 1;
    utter.pitch = 1;
    window.speechSynthesis.speak(utter);
  } catch (err) {
    console.warn("พูดเสียงเตือนไม่ได้", err);
  }
}

function badgeClass(status) {
  if (status === "กลับที่นั่ง") return "badge-back";
  if (status === "ปวดหนัก") return "badge-heavy";
  if (status === "ปวดน้อย") return "badge-light";
  if (status === "กินข้าว") return "badge-food";
  return "";
}

function formatDuration(seconds) {
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = seconds % 60;
  return [h, m, s].map(v => String(v).padStart(2, "0")).join(":");
}

function formatAgo(seconds) {
  const m = Math.floor(seconds / 60);
  if (m < 1) return "กลับมาเมื่อสักครู่";
  return `กลับมา ${m} นาทีที่แล้ว`;
}

async function loadData() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();

    const summaryEl = document.getElementById("summary");
    summaryEl.innerHTML = `
      <div class="summary-card">
        <div class="label">กำลังออกนอกที่นั่ง</div>
        <div class="value">${data.summary.out_now}</div>
      </div>
      ${Object.entries(data.summary.activity_counts_today).map(([act, count]) => `
        <div class="summary-card">
          <div class="label">${act}วันนี้</div>
          <div class="value">${count} ครั้ง</div>
        </div>
      `).join("")}
    `;

    const tbody = document.getElementById("table-body");

    const sortedPeople = [...data.people].sort((a, b) => {
      const aOff = a.checkin && a.checkin.round1.status === "offshift";
      const bOff = b.checkin && b.checkin.round1.status === "offshift";
      if (aOff !== bOff) return aOff ? 1 : -1;

      const aActive = a.status !== "กลับที่นั่ง";
      const bActive = b.status !== "กลับที่นั่ง";
      if (aActive === bActive) return 0;
      return aActive ? -1 : 1;
    });

    // เช็คว่ามีใครเพิ่งเกินเวลาใหม่ในรอบนี้ไหม เพื่อพูดเสียงเตือน
    const newOvertimePeople = [];
    const newWarningPeople = [];
    const currentOvertimeUsers = new Set();
    const currentWarningUsers = new Set();

    sortedPeople.forEach(p => {
      const isBack = p.status === "กลับที่นั่ง";
      const limit = OVERTIME_LIMITS[p.status];
      const isOvertime = !isBack && limit && p.duration_seconds > limit;
      const isNearLimit = !isBack && limit && !isOvertime && p.duration_seconds >= (limit - 60);

      if (isOvertime) {
        currentOvertimeUsers.add(p.user_id);
        if (!overtimeAlerted.has(p.user_id)) {
          newOvertimePeople.push({ username: p.username, activity: p.status });
        }
      } else if (isNearLimit) {
        currentWarningUsers.add(p.user_id);
        if (!warningAlerted.has(p.user_id)) {
          newWarningPeople.push({ username: p.username, activity: p.status });
        }
      }
    });

    newWarningPeople.forEach((p, i) => {
      setTimeout(() => speakWarning(p.username, p.activity), i * 3000);
    });
    newOvertimePeople.forEach((p, i) => {
      setTimeout(() => speakAlert(p.username, p.activity), (newWarningPeople.length + i) * 3000);
    });

    // อัปเดต set คนที่เกินเวลา/ใกล้เกินอยู่ (ลบคนที่กลับที่นั่งแล้วออก เผื่อรอบหน้าเตือนใหม่)
    overtimeAlerted.clear();
    currentOvertimeUsers.forEach(id => overtimeAlerted.add(id));
    warningAlerted.clear();
    currentWarningUsers.forEach(id => warningAlerted.add(id));

    tbody.innerHTML = sortedPeople.map(p => {
      const isBack = p.status === "กลับที่นั่ง";
      const limit = OVERTIME_LIMITS[p.status];
      const isOvertime = !isBack && limit && p.duration_seconds > limit;

      const displayLabel = isOvertime ? `เกินเวลา${p.status}` : p.status;
      const badgeCls = isOvertime ? "badge-overtime" : badgeClass(p.status);
      const warnIcon = isOvertime ? "⚠️ " : "";
      const rowCls = isBack ? "row-idle" : "row-active";

      const timeHtml = isBack
        ? `<span class="time-cell idle">${formatAgo(p.duration_seconds)}</span>`
        : `<span class="time-cell">${formatDuration(p.duration_seconds)}</span>`;

      const isHoliday = p.checkin && p.checkin.round1.status === "holiday";

      const checkinHtml = p.checkin ? `
        <span style="display:inline-flex; flex-direction:column; align-items:center; gap:2px;">
          <span class="checkin-badge checkin-${p.checkin.round1.status}">
            ${p.checkin.round1.status === "green" ? "✓ " : ""}${p.checkin.round1.status === "holiday" ? "วันหยุด" : p.checkin.round1.label}
          </span>
          ${p.checkin.round1.time ? `<span style="font-size:10px; color:#4caf6e;">${p.checkin.round1.time}</span>` : ""}
        </span>
        ${isHoliday ? "" : `
        <span style="display:inline-flex; flex-direction:column; align-items:center; gap:2px;">
          <span class="checkin-badge checkin-${p.checkin.round2.status}">
            ${p.checkin.round2.status === "green" ? "✓ " : ""}${p.checkin.round2.label}
          </span>
          ${p.checkin.round2.time ? `<span style="font-size:10px; color:#4caf6e;">${p.checkin.round2.time}</span>` : ""}
        </span>
        `}
      ` : "";

      return `
        <tr class="${rowCls}">
          <td>
            <div class="user-cell">
              ${p.username}
              ${checkinHtml}
              <span style="color:#6f6f7d; font-size:12px; font-family:Consolas,monospace; margin-left:8px;">
                (${formatDuration(p.total_today_seconds || 0)})
              </span>
            </div>
          </td>
          <td style="text-align:center;">
            <span class="badge ${badgeCls}">${warnIcon}${displayLabel}</span>
          </td>
          <td>${timeHtml}</td>
        </tr>
      `;
    }).join("");

    document.getElementById("updated").textContent =
      "อัปเดตล่าสุด: " + new Date().toLocaleTimeString("th-TH");
  } catch (err) {
    console.error("โหลดข้อมูลไม่สำเร็จ", err);
  }
}

loadData();
setInterval(loadData, 5000);
</script>

</body>
</html>
