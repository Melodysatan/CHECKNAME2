<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>สถานะพนักงาน</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: "Tahoma", "Segoe UI", sans-serif;
    background: #0f0f14;
    margin: 0;
    padding: 32px;
    color: #e6e6e6;
    position: relative;
    overflow-x: hidden;
    min-height: 100vh;
  }
  .bg-emoji {
    position: fixed;
    top: -40px;
    font-size: 22px;
    opacity: 0.5;
    pointer-events: none;
    animation: fall linear infinite;
    z-index: 0;
  }
  @keyframes fall {
    from { transform: translateY(0) rotate(0deg); }
    to { transform: translateY(110vh) rotate(360deg); }
  }
  .content { position: relative; z-index: 1; }
  h1 {
    font-size: 22px;
    margin-bottom: 20px;
    color: #fff;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .summary {
    display: flex;
    gap: 14px;
    margin-bottom: 28px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .summary-card {
    background: linear-gradient(145deg, #1c1c24, #15151a);
    border: 1px solid #2a2a35;
    border-radius: 14px;
    padding: 18px 22px;
    min-width: 150px;
    text-align: center;
  }
  .summary-card .label {
    font-size: 13px;
    color: #9a9aa8;
    margin-bottom: 6px;
  }
  .summary-card .value {
    font-size: 26px;
    font-weight: bold;
    color: #fff;
  }
  .table-wrap {
    background: #15151a;
    border: 1px solid #2a2a35;
    border-radius: 14px;
    overflow: hidden;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }
  th:nth-child(1), td:nth-child(1) { width: 35%; }
  th:nth-child(2), td:nth-child(2) { width: 35%; text-align: center; }
  th:nth-child(3), td:nth-child(3) { width: 35%; text-align: right; }
  th, td {
    text-align: left;
    padding: 14px 18px;
    font-size: 14px;
  }
  th {
    background: #1a1a22;
    color: #9a9aa8;
    font-weight: 600;
    border-bottom: 1px solid #2a2a35;
  }
  tbody tr {
    border-bottom: 1px solid #21212a;
    transition: background 0.15s;
  }
  tbody tr.row-active {
    background: #211616;
  }
  tbody tr.row-active:hover {
    background: #2a1c1c;
  }
  tbody tr.row-idle:hover {
    background: #1a1a22;
  }
  tbody tr:last-child {
    border-bottom: none;
  }
  .user-cell {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 500;
  }
  .badge {
    display: inline-block;
    padding: 4px 11px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
  }
  .badge-back { background: #16331f; color: #4caf6e; }
  .badge-heavy { background: #3a1717; color: #e57373; }
  .badge-light { background: #3a2e10; color: #e0a83a; }
  .badge-food { background: #3a2e10; color: #e0a83a; }
  .badge-overtime {
    background: #4a1212;
    color: #ff6b6b;
    animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255,107,107,0.5); }
    50% { box-shadow: 0 0 0 5px rgba(255,107,107,0.15); }
  }
  .time-cell {
    color: #c5c5d0;
    font-family: "Consolas", monospace;
  }
  .time-cell.idle {
    color: #6f6f7d;
    font-family: inherit;
  }
  .updated {
    margin-top: 16px;
    font-size: 12px;
    color: #6f6f7d;
  }
  .stats-section {
    margin-top: 36px;
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 16px;
  }
  .stats-card {
    background: #15151a;
    border: 1px solid #2a2a35;
    border-radius: 14px;
    padding: 18px 20px;
  }
  .stats-card h3 {
    font-size: 15px;
    color: #c5c5d0;
    margin: 0 0 14px;
    font-weight: 500;
  }
  .leaderboard-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid #21212a;
    font-size: 13px;
  }
  .leaderboard-row:last-child { border-bottom: none; }
  .leaderboard-rank {
    color: #6f6f7d;
    width: 20px;
    flex-shrink: 0;
  }
  .leaderboard-count {
    color: #e0a83a;
    font-weight: 600;
  }
</style>
</head>
<body>

<div class="content">

<h1>📋 สถานะพนักงานวันนี้</h1>

<div class="summary" id="summary"></div>

<div class="table-wrap">
<table>
  <thead>
    <tr>
      <th>ผู้ใช้</th>
      <th style="text-align:center;">สถานะ</th>
      <th>เวลา</th>
    </tr>
  </thead>
  <tbody id="table-body"></tbody>
</table>
</div>

<div class="updated" id="updated"></div>

<div class="stats-section">
  <div class="stats-card">
    <h3>📊 สถิติ 7 วันล่าสุด</h3>
    <canvas id="statsChart" height="180"></canvas>
  </div>
  <div class="stats-card">
    <h3>🏆 ใช้กิจกรรมบ่อยสุด (7 วัน)</h3>
    <div id="leaderboard"></div>
  </div>
</div>

</div>

<script>
const API_URL = "/api/status";
const FLOAT_EMOJIS = ["🎉", "✨", "🌴", "💧", "🟦", "🟡", "🌟", "🍃"];

function spawnEmoji() {
  const el = document.createElement("div");
  el.className = "bg-emoji";
  el.textContent = FLOAT_EMOJIS[Math.floor(Math.random() * FLOAT_EMOJIS.length)];
  el.style.left = Math.random() * 100 + "vw";
  const duration = 10 + Math.random() * 12;
  el.style.animationDuration = duration + "s";
  el.style.fontSize = (16 + Math.random() * 14) + "px";
  document.body.appendChild(el);
  setTimeout(() => el.remove(), duration * 1000);
}
setInterval(spawnEmoji, 1200);
for (let i = 0; i < 6; i++) setTimeout(spawnEmoji, i * 400);

const OVERTIME_LIMITS = {
  "ปวดหนัก": 20 * 60,
  "ปวดน้อย": 6 * 60,
  "กินข้าว": 30 * 60,
};

function badgeClass(status) {
  if (status === "กลับที่นั่ง") return "badge-back";
  if (status === "ปวดหนัก") return "badge-heavy";
  if (status === "ปวดน้อย") return "badge-light";
  if (status === "กินข้าว") return "badge-food";
  return "";
}

function formatDuration(seconds) {
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = seconds % 60;
  return [h, m, s].map(v => String(v).padStart(2, "0")).join(":");
}

function formatAgo(seconds) {
  const m = Math.floor(seconds / 60);
  if (m < 1) return "กลับมาเมื่อสักครู่";
  return `กลับมา ${m} นาทีที่แล้ว`;
}

async function loadData() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();

    const summaryEl = document.getElementById("summary");
    summaryEl.innerHTML = `
      <div class="summary-card">
        <div class="label">กำลังออกนอกที่นั่ง</div>
        <div class="value">${data.summary.out_now}</div>
      </div>
      ${Object.entries(data.summary.activity_counts_today).map(([act, count]) => `
        <div class="summary-card">
          <div class="label">${act}วันนี้</div>
          <div class="value">${count} ครั้ง</div>
        </div>
      `).join("")}
    `;

    const tbody = document.getElementById("table-body");

    const sortedPeople = [...data.people].sort((a, b) => {
      const aActive = a.status !== "กลับที่นั่ง";
      const bActive = b.status !== "กลับที่นั่ง";
      if (aActive === bActive) return 0;
      return aActive ? -1 : 1;
    });

    tbody.innerHTML = sortedPeople.map(p => {
      const isBack = p.status === "กลับที่นั่ง";
      const limit = OVERTIME_LIMITS[p.status];
      const isOvertime = !isBack && limit && p.duration_seconds > limit;

      const displayLabel = isOvertime ? `เกินเวลา${p.status}` : p.status;
      const badgeCls = isOvertime ? "badge-overtime" : badgeClass(p.status);
      const warnIcon = isOvertime ? "⚠️ " : "";
      const rowCls = isBack ? "row-idle" : "row-active";

      const timeHtml = isBack
        ? `<span class="time-cell idle">${formatAgo(p.duration_seconds)}</span>`
        : `<span class="time-cell">${formatDuration(p.duration_seconds)}</span>`;

      return `
        <tr class="${rowCls}">
          <td>
            <div class="user-cell">${p.username}</div>
          </td>
          <td style="text-align:center;">
            <span class="badge ${badgeCls}">${warnIcon}${displayLabel}</span>
          </td>
          <td>${timeHtml}</td>
        </tr>
      `;
    }).join("");

    document.getElementById("updated").textContent =
      "อัปเดตล่าสุด: " + new Date().toLocaleTimeString("th-TH");
  } catch (err) {
    console.error("โหลดข้อมูลไม่สำเร็จ", err);
  }
}

loadData();
setInterval(loadData, 5000);

// ===== กราฟสถิติ =====
let statsChartInstance = null;

async function loadStats() {
  try {
    const res = await fetch("/api/stats");
    const data = await res.json();

    const labels = data.days.map(d => {
      const dt = new Date(d);
      return dt.toLocaleDateString("th-TH", { day: "numeric", month: "short" });
    });

    const colors = {
      "กินข้าว": "#e0a83a",
      "ปวดหนัก": "#e57373",
      "ปวดน้อย": "#e0c050",
    };

    const datasets = Object.entries(data.daily_data).map(([activity, byDay]) => ({
      label: activity,
      data: data.days.map(d => byDay[d] || 0),
      backgroundColor: colors[activity] || "#888",
      borderRadius: 4,
    }));

    const ctx = document.getElementById("statsChart");
    if (statsChartInstance) statsChartInstance.destroy();
    statsChartInstance = new Chart(ctx, {
      type: "bar",
      data: { labels, datasets },
      options: {
        responsive: true,
        plugins: {
          legend: { labels: { color: "#c5c5d0" } },
        },
        scales: {
          x: { ticks: { color: "#9a9aa8" }, grid: { color: "#21212a" } },
          y: { ticks: { color: "#9a9aa8", precision: 0 }, grid: { color: "#21212a" }, beginAtZero: true },
        },
      },
    });

    const lb = document.getElementById("leaderboard");
    if (data.leaderboard.length === 0) {
      lb.innerHTML = `<p style="color:#6f6f7d; font-size:13px;">ยังไม่มีข้อมูล</p>`;
    } else {
      lb.innerHTML = data.leaderboard.map((p, i) => `
        <div class="leaderboard-row">
          <span><span class="leaderboard-rank">#${i + 1}</span>${p.username}</span>
          <span class="leaderboard-count">${p.count} ครั้ง</span>
        </div>
      `).join("");
    }
  } catch (err) {
    console.error("โหลดสถิติไม่สำเร็จ", err);
  }
}

loadStats();
setInterval(loadStats, 60000); // กราฟอัปเดตทุก 1 นาทีพอ ไม่ต้องถี่
</script>

</body>
</html>
